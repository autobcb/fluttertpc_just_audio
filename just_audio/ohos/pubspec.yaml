name: just_audio_ohos
description: Flutter is a feature rich audio player. Loop through various audio formats and play any sound from any source (asset/file/URL/stream) for seamless playback.
version: 1.0.0
homepage: https://gitcode.com/openharmony-sig/fluttertpc_just_audio

topics:
  - audio
  - sound
  - player
  - background

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  just_audio_platform_interface: ^4.2.2

  just_audio_web: ^0.4.9

  path_provider:
    git:
      url: "https://gitcode.com/openharmony-sig/flutter_packages.git"
      path: "packages/path_provider/path_provider"
      
  audio_session:
    git:
      url: "https://gitcode.com/openharmony-sig/flutter_audio_session.git"
      path: ""

  rxdart: '>=0.26.0 <0.28.0'
  path: ^1.8.0
  async: ^2.10.0
  uuid: '>=3.0.1 <5.0.0'
  crypto: ^3.0.3
  meta: ^1.3.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.0.0
  plugin_platform_interface: ^2.0.0
  flutter_lints: ^2.0.1

flutter:
  plugin:
    platforms:
      ohos:
        pluginClass: JustAudioOhosPlugin